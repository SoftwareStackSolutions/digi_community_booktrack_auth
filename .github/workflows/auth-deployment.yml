name: Auth Backend CI Pipeline

on:
  push:
    branches: [ development ]

jobs:

# -----------------------------------------
# 1️⃣ CHECKOUT
# -----------------------------------------
  checkout-source-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

# -----------------------------------------
# 2️⃣ BUILD ARTIFACT + VERSIONING
# -----------------------------------------
  build-and-publish-artifact:
    name: Build and Publish Artifact
    runs-on: ubuntu-latest
    needs: checkout-source-code

    outputs:
      version: ${{ steps.set_version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Install zip
        run: sudo apt-get update && sudo apt-get install -y zip unzip

      - name: Zip auth-service
        run: |
          cd auth-service
          zip -r ../auth-package.zip . -x "*.git*" "__pycache__/*"

      - name: Checkout Artifact Repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      - name: Check previous hash
        run: |
          cd artifact-repo/Auth
          latest_file=$(ls Auth-v*.zip 2>/dev/null | sort -V | tail -n 1)

          if [[ -f "$latest_file" ]]; then
            unzip -p "$latest_file" | sha256sum | cut -d' ' -f1 > ../../../latest_hash.txt
          else
            echo "no_previous_hash" > ../../../latest_hash.txt
          fi

      - name: Generate current hash
        run: |
          unzip -p auth-package.zip | sha256sum | cut -d' ' -f1 > current_hash.txt

      - name: Compare hash
        id: hash
        run: |
          if cmp -s latest_hash.txt current_hash.txt; then
            echo "no_change=true" >> $GITHUB_OUTPUT
          else
            echo "no_change=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate version
        id: set_version
        run: |
          cd artifact-repo/Auth
          count=$(ls Auth-v*.zip 2>/dev/null | wc -l)

          if [ "${{ steps.hash.outputs.no_change }}" = "true" ]; then
            echo "version=latest" >> $GITHUB_OUTPUT
          else
            echo "version=v$((count + 1))" >> $GITHUB_OUTPUT
          fi

      - name: Move artifact
        if: steps.hash.outputs.no_change == 'false'
        run: |
          VERSION=${{ steps.set_version.outputs.version }}
          mv auth-package.zip artifact-repo/Auth/Auth-${VERSION}.zip
          cp artifact-repo/Auth/Auth-${VERSION}.zip artifact-repo/Auth/Auth-latest.zip

      - name: Commit & Push
        if: steps.hash.outputs.no_change == 'false'
        run: |
          cd artifact-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Auth/*.zip
          git commit -m "Auth Artifact ${{ steps.set_version.outputs.version }}"
          git push origin main

# -----------------------------------------
# 3️⃣ BUILD & PUSH TO ECR (AUTO ACCOUNT ID)
# -----------------------------------------
  container-build-and-publish:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-publish-artifact

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Checkout artifact repo
        uses: actions/checkout@v4
        with:
          repository: SoftwareStackSolutions/digi_community_booktrack_artifact
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: artifact-repo

      - name: Copy latest artifact
        run: |
          cp artifact-repo/Auth/Auth-latest.zip ./artifact.zip

      - name: Extract artifact
        run: |
          mkdir app
          unzip artifact.zip -d app

      # ✅ AWS LOGIN (OIDC)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ✅ AUTO GET ACCOUNT ID
      - name: Get AWS Account ID
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      # ✅ LOGIN TO ECR
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin \
          ${{ steps.aws_account.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      # BUILD IMAGE
      - name: Build Docker Image
        run: docker build -t auth-app ./app

      # TAG IMAGE
      - name: Tag Image
        run: |
          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}
          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}
          REGION=${{ secrets.AWS_REGION }}

          ECR_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/auth-app

          docker tag auth-app:latest $ECR_URI:$VERSION
          docker tag auth-app:latest $ECR_URI:latest

      # PUSH IMAGE
      - name: Push to ECR
        run: |
          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}
          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}
          REGION=${{ secrets.AWS_REGION }}

          ECR_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/auth-app

          docker push $ECR_URI:$VERSION
          docker push $ECR_URI:latest

# -----------------------------------------
# 4️⃣ DEPLOY TO EKS
# -----------------------------------------
  deploy-to-eks:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: container-build-and-publish

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws_account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy to cluster
        run: |
          VERSION=${{ needs.build-and-publish-artifact.outputs.version }}
          ACCOUNT_ID=${{ steps.aws_account.outputs.account_id }}
          REGION=${{ secrets.AWS_REGION }}

          ECR_URI=$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/auth-app

          sed -i "s|IMAGE_PLACEHOLDER|$ECR_URI:$VERSION|g" auth-deployment.yaml

          kubectl apply -f namespace.yaml
          kubectl apply -f postgres/
          kubectl apply -f secrets.yaml
          kubectl apply -f auth-deployment.yaml
          kubectl apply -f auth-service.yaml

      - name: Restart Deployment
        run: |
          kubectl rollout restart deployment -n auth-app
